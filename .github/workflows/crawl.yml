name: Crawl Fund Data

on:
  schedule:
    # UTC+7 = VN. Chạy mỗi 1h, T2-T6, từ 8:00 đến 15:00 ICT (1:00-8:00 UTC)
    - cron: "0 1 * * 1-5"   # 08:00 ICT
    - cron: "0 2 * * 1-5"   # 09:00 ICT
    - cron: "0 3 * * 1-5"   # 10:00 ICT
    - cron: "0 4 * * 1-5"   # 11:00 ICT
    - cron: "0 5 * * 1-5"   # 12:00 ICT
    - cron: "0 6 * * 1-5"   # 13:00 ICT
    - cron: "0 7 * * 1-5"   # 14:00 ICT
    - cron: "0 8 * * 1-5"   # 15:00 ICT (NAV cuối ngày)

  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('crawler/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        run: python crawler/crawler.py

      - name: Commit và push data.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -f public/data.json
          git diff --staged --quiet || git commit -m "data: cập nhật $(TZ='Asia/Ho_Chi_Minh' date '+%H:%M %d/%m/%Y')"
          git push
